name: lick-fun-indexer

handlers: src

# ─── Contracts ─────────────────────────────────────────────────────────────────
# ABIs and events to index. These are shared across all chains.
# On mainnet, GraduationRouter is added so LiquidityMigrated events are indexed
# and DEX trades can appear in charts/volume.

contracts:
  - name: Factory
    abi_file_path: "./abis/Factory.json"
    events:
      - event: "TokenCreated(address indexed token, address indexed curve, address indexed creator)"

  - name: BondingCurve
    abi_file_path: "./abis/BondingCurve.json"
    events:
      - event: "CurveLaunch(address indexed token, uint256 startTime, uint256 startBlock)"
      - event: "CurveBuy(address indexed buyer, address indexed token, uint256 amountIn, uint256 amountOut)"
      - event: "CurveSell(address indexed seller, address indexed token, uint256 amountIn, uint256 amountOut)"
      - event: "CurveGraduate(address indexed token, address indexed pool)"

  - name: FeeRouter
    abi_file_path: "./abis/FeeRouter.json"
    events:
      - event: "FeeRouted(address indexed token, uint256 totalAmount, uint256 creatorShare, uint256 lpShare, uint256 buybackShare, uint256 giftShare)"
      - event: "FeeConfigSet(address indexed token)"

  - name: PredictionMarket
    abi_file_path: "./abis/PredictionMarket.json"
    events:
      - event: "MarketCreated(address indexed token)"
      - event: "BetPlaced(address indexed token, address indexed bettor, bool indexed isYes, uint256 amount)"
      - event: "MarketResolved(address indexed token, bool outcome)"
      - event: "WinningsClaimed(address indexed token, address indexed claimant, uint256 amount)"

  - name: GraduationRouter
    abi_file_path: "./abis/GraduationRouter.json"
    events:
      - event: "LiquidityMigrated(address indexed token, address indexed pair, uint256 tokenLiquidity, uint256 monLiquidity)"

  - name: VaultBuybackBurn
    abi_file_path: "./abis/VaultBuybackBurn.json"
    events:
      - event: "Executed(address indexed token, uint256 monSpent, uint256 tokensBurned)"

  - name: VaultLPSupport
    abi_file_path: "./abis/VaultLPSupport.json"
    events:
      - event: "Executed(address indexed token, uint256 monAdded, uint256 lpBurned)"

# ─── Chains ────────────────────────────────────────────────────────────────────
# MAINNET (chain 143) — deployed 2026-06-27, block 83961211
# To revert to testnet: comment out this block and uncomment the testnet block below.

chains:
  - id: 143
    hypersync_config:
      url: https://monad.hypersync.xyz
    rpc:
      url: https://rpc.monad.xyz
    start_block: 83961211
    contracts:
      - name: Factory
        address: "0x9845c5625d9f9C48e17956940485aAAAD168aA10"
      - name: BondingCurve
      - name: FeeRouter
        address: "0x5BBe528936E627d33DE36f10d9DB946089b9E903"
      - name: PredictionMarket
        address: "0xe9200097cA7d7a48D87ce249B671c36ccB406776"
      - name: GraduationRouter
        address: "0xb2Dc164Ac4eCDDA7Ea2D4115bC122463c65460b2"
      - name: VaultBuybackBurn
        address: "0x45B1Ee1E9E8E9FF8CE6bBbd55B430Cab4b25e06d"
      - name: VaultLPSupport
        address: "0xF1Aac85a5F964564e472BF1E0628c536b01809e0"

