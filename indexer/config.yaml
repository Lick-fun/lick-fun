name: lick-fun-indexer

contracts:
  - name: Factory
    abi_file_path: "./abis/Factory.json"
    handler: "./src/EventHandlers.ts"
    events:
      - event: "CurveCreate(address indexed creator, address indexed token, address indexed curve, uint256 virtualMon, uint256 virtualTokens, uint256 startTime)"

  - name: BondingCurve
    abi_file_path: "./abis/BondingCurve.json"
    handler: "./src/EventHandlers.ts"
    events:
      - event: "CurveLaunch(address indexed token, uint256 startTime, uint256 startBlock)"
      - event: "CurveBuy(address indexed buyer, address indexed token, uint256 amountIn, uint256 amountOut)"
      - event: "CurveSell(address indexed seller, address indexed token, uint256 amountIn, uint256 amountOut)"
      - event: "CurveGraduate(address indexed token, address indexed pool)"

chains:
  - id: 10143
    rpc: ${ENVIO_RPC_URL}
    start_block: 0
    contracts:
      - name: Factory
        address: "${ENVIO_FACTORY_ADDRESS}"
      - name: BondingCurve
