# One entry per token launched through the Factory.
# Keyed by token (ERC-20) address.
type Token {
  id: ID!                     # token address (lowercase hex)
  creator: String!            # creator wallet address
  name: String!               # ERC-20 name (read from contract at launch)
  symbol: String!             # ERC-20 symbol (read from contract at launch)
  curve: String!              # bonding curve contract address
  virtualMon: BigInt!         # vMON reserve at launch (80,000e18)
  virtualTokens: BigInt!      # vToken reserve at launch (477,000,000e18)
  targetTokenAmount: BigInt!  # tokens available on curve (TOTAL_SUPPLY - VIRTUAL_TOKENS)
  startTime: BigInt!          # timestamp trading becomes active (0 = immediate)
  startBlock: BigInt!         # block BondingCurve was deployed (anti-sniping reference)
  realMon: BigInt!            # current real MON in curve (updated on each trade)
  soldTokens: BigInt!         # tokens sold to buyers (updated on each trade)
  graduated: Boolean!         # true once realMon >= 100,000 MON
  pairAddress: String         # DEX pair address (set when LiquidityMigrated fires; null until graduation)
  createdAt: BigInt!          # block.timestamp of CurveCreate
  graduatedAt: BigInt         # block.timestamp of CurveGraduate (null until grad)
  buyCount: Int!              # total number of buy trades
  sellCount: Int!             # total number of sell trades
  totalBuyVolume: BigInt!     # cumulative MON spent buying (sum of amountIn on buys)
  totalSellVolume: BigInt!    # cumulative MON received selling (sum of amountOut on sells)
  uniqueBuyerCount: Int!      # number of unique buyer wallet addresses
  creatorSellCount: Int!      # number of times creator sold their own token
}

# One entry per unique (token, buyer) pair.
# Keyed by "${tokenAddress}-${traderAddress}".
# Used to count unique buyers per token without using in-memory Sets.
type TokenBuyerIndex @entity {
  id: ID!         # "${tokenAddress}-${traderAddress}"
  token: String!
  buyer: String!
}

# One entry per buy or sell trade.
# Keyed by txHash-logIndex for uniqueness.
type Trade {
  id: ID!                     # "${txHash}-${logIndex}"
  token: Token!               # the token being traded
  trader: String!             # buyer or seller wallet address
  isBuy: Boolean!             # true = buy (MON→token), false = sell (token→MON)
  amountIn: BigInt!           # MON in (buy) or tokens in (sell) — raw event value
  amountOut: BigInt!          # tokens out (buy) or net MON out (sell) — raw event value
  blockNumber: Int!           # block this trade landed in
  blockTimestamp: BigInt!     # unix timestamp of the block
  penaltyBps: Int!            # anti-sniping penalty applied (0 if after block 7+)
}

# One entry per unique creator address.
# Keyed by creator wallet address.
# Tokens field is derived from Token.creator — no manual maintenance needed.
type Profile {
  id: ID!                     # creator wallet address (lowercase hex)
  createdAt: BigInt!          # block.timestamp of their FIRST token launch
  tokenCount: Int!            # total tokens created
  graduatedCount: Int!        # tokens that reached graduation
  totalBuyVolume: BigInt!     # sum of MON bought across all their tokens
  totalSellVolume: BigInt!    # sum of MON sold across all their tokens
  tokens: [Token!]! @derivedFrom(field: "creator")
}

# ─── Prediction Markets ───────────────────────────────────────────────────────

# One entry per prediction market.
# Keyed by token address (same as the LickToken being bet on).
type Market @entity {
  id: ID!               # token address (lowercase hex)
  totalYesMON: BigInt!  # total MON bet YES
  totalNoMON: BigInt!   # total MON bet NO
  resolved: Boolean!    # has been settled
  outcome: Boolean      # true = graduated (YES wins), null until resolved
  cancelled: Boolean!   # one-sided market cancelled
  closeTime: BigInt!    # timestamp after which no more bets accepted
  createdAt: BigInt!    # block.timestamp of MarketCreated
  resolvedAt: BigInt    # block.timestamp of MarketResolved (null until resolved)
}

# One entry per bet placed.
# Keyed by "${tokenAddress}-${bettor}-${isYes}" — one record per side per bettor.
# If a bettor bets YES multiple times, amounts are accumulated.
type Bet @entity {
  id: ID!           # "${tokenAddress}-${bettor}-yes" or "-no"
  market: Market!   # the market being bet on
  bettor: String!   # bettor wallet address
  isYes: Boolean!   # true = YES bet, false = NO bet
  amount: BigInt!   # total MON bet (accumulated across multiple bets)
  lastBetAt: BigInt! # block.timestamp of most recent bet
}

# One entry per winnings claim.
# Keyed by "${tokenAddress}-${claimant}".
type Claim @entity {
  id: ID!              # "${tokenAddress}-${claimant}"
  market: Market!      # the market winnings were claimed from
  claimant: String!    # claimant wallet address
  amount: BigInt!      # MON received
  claimedAt: BigInt!   # block.timestamp of WinningsClaimed
}

# ─────────────────────────────────────────────────────────────────────────────

# Phase 2 — FeeRouter fee configuration per token.
# Keyed by token address.
type FeeConfig @entity {
  id: ID!
  token: String!
  creatorShareBps: BigInt!
  lpSupportBps: BigInt!
  buybackBurnBps: BigInt!
  preset: String!
  blockTimestamp: BigInt!
}

# Phase 2 — FeeRouter fee routing events.
# Keyed by txHash-logIndex for uniqueness.
type FeeEvent @entity {
  id: ID!
  token: String!
  totalAmount: BigInt!
  creatorShare: BigInt!
  lpShare: BigInt!
  buybackShare: BigInt!
  blockTimestamp: BigInt!
}

# Phase 4 — Vault execution events.
# Fired by VaultBuybackBurn or VaultLPSupport when execute() succeeds.
# Keyed by txHash-logIndex for uniqueness.
type VaultExecution @entity {
  id: ID!
  vault: String!         # vault contract address ("buyback" | "lp")
  vaultType: String!     # "buyback" or "lp"
  token: String!         # LickToken address
  monSpent: BigInt!      # MON used in execution
  tokensResult: BigInt!  # tokensBurned (buyback) or lpBurned (lp)
  blockTimestamp: BigInt!
  blockNumber: BigInt!
}