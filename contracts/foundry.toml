[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.27"

# Optimizer enabled for gas-efficient contract deployment
optimizer = true
optimizer_runs = 200

# Monad testnet configuration
# chain_id = 10143 (testnet) / 143 (mainnet)
# EVM: Paris-compatible (Monad targets Paris EVM)
evm_version = "paris"

# Monad charges gas on DECLARED limit, not gas used.
# Set tight gas limits in scripts via --gas-limit.
# Block gas limit is ~200M; blocks ~400ms.
via_ir = true

# Test configuration
[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 256
depth = 500

# Testnet profile for deployments
[profile.monad-testnet]
eth_rpc_url = "${RPC_URL}"
chain_id = 10143

# Mainnet profile
[profile.monad-mainnet]
eth_rpc_url = "${RPC_URL}"
chain_id = 143